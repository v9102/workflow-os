name: Deploy to Azure Web App

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clear stale Oryx build artifacts (best effort)
        continue-on-error: true
        shell: bash
        env:
          PP: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          set -uo pipefail
          USER=$(echo "$PP" | sed -n 's/.*userName="\([^"]*\)".*/\1/p' | head -1)
          PASS=$(echo "$PP" | sed -n 's/.*userPWD="\([^"]*\)".*/\1/p' | head -1)
          if [ -z "$USER" ] || [ -z "$PASS" ]; then
            echo "Could not read SCM creds; the deploy step will overwrite the tarball anyway."
            exit 0
          fi
          BASE="https://workflowos-api.scm.azurewebsites.net"
          # Kudu VFS deletes REQUIRE an If-Match header — without it you get 409/412
          # and the stale tarball survives. Remove the previous build's tarball so
          # Oryx can't extract old code; the deploy step writes a fresh one.
          for f in /site/wwwroot/output.tar.zst /site/wwwroot/output.tar.gz; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE -H "If-Match: *" -u "$USER:$PASS" "$BASE/api/vfs$f" || true)
            echo "DELETE $f -> $code"
          done

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: workflowos-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend
