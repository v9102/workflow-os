name: Deploy to Azure Web App

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clear cached Oryx build artifacts
        shell: bash
        run: |
          set -e
          PP="${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}"
          USER=$(echo "$PP" | grep -oP 'userName="\K[^"]+')
          PASS=$(echo "$PP" | grep -oP 'userPWD="\K[^"]+')
          BASE="https://workflowos-api.scm.azurewebsites.net/api/vfs/site/wwwroot"
          for f in oryx-manifest.toml output.tar.zst; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE -u "$USER:$PASS" "$BASE/$f" 2>/dev/null || true)
            echo "DELETE $f → $code"
          done

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: workflowos-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend
