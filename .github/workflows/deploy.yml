name: Deploy to Azure Web App

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set Azure config (clear Oryx cache, enable run-from-package)
        continue-on-error: true
        shell: bash
        run: |
          set -e
          PP="${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}"
          USER=$(echo "$PP" | sed -n 's/.*userName="\([^"]*\)".*/\1/p')
          PASS=$(echo "$PP" | sed -n 's/.*userPWD="\([^"]*\)".*/\1/p')
          if [ -n "$USER" ] && [ -n "$PASS" ]; then
            BASE="https://workflowos-api.scm.azurewebsites.net"
            for f in /site/wwwroot/oryx-manifest.toml /site/wwwroot/output.tar.zst; do
              code=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE -u "$USER:$PASS" "$BASE/api/vfs$f" || true)
              echo "DELETE $f → $code"
            done
          else
            echo "Could not extract credentials; skipping cache clear"
          fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: workflowos-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend
